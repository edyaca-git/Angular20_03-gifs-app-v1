<div>
    <!-- Como recibe una señal scr va en corchetes y se le 
    asigna el valor de la señal con la función imageUrl() 
    que es la que devuelve el valor de la señal -->

    <!-- nieta que va a recibir de gif-list la url de la imagen a mostrar
     y se muestra la imagen con la url recibida  -->
    <img class="h-full w-full rounded-lg object-cover" 
         [src]="imageUrl()" alt="Gif image">
         
</div>
