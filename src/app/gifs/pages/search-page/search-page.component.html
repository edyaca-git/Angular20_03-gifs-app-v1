<h2 class="text-2x1 font-bold mt-5">Buscar Gifs </h2>
<h3 class="text-sm text-gray-500">Buscar Gifs por nombre, descripcion o tag </h3>


<section class="flex flex-col gap-4">

    <input
      type="text"
      placeholder="Buscar gifs"
      class="mt-3 border border-gray-300 rounded-md p-2"
      (keyup.enter)="onSearch(txtSearch.value)"
      #txtSearch
      

    />
</section>


<section class="py-5">
    <!-- Este es el Padre que tiene la Señal que contiene las URLs de los gifs en 
     tendencia y los envío al componente gif-list -->
       <gif-list  [gifs]="gifs()" />
    
</section>
